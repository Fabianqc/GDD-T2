name: Deploy Backend to Server

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend via SSH & PM2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "🚀 Actualizando repositorio en el servidor..."
            cd ~/GDD-T2
            git pull origin main

            echo "📦 Verificando entorno virtual y dependencias..."
            cd ~/GDD-T2/Backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🔄 Reiniciando servicio en PM2..."
            export PATH=$PATH:/usr/local/bin:~/.nvm/versions/node/$(node -v 2>/dev/null)/bin:~/.npm-global/bin
            pm2 restart gdd-t2-backend || pm2 start ecosystem.config.js
            pm2 save

            echo "✅ ¡Despliegue de Backend completado exitosamente!"
